project_name: opensupport-llm-smoke
base_model: Qwen/Qwen3-4B-Instruct-2507
output_dir: outputs/smoke_qwen3_8b_sft

dataset:
  train_file: data/synthetic_rag_train.jsonl
  eval_file: data/synthetic_rag_eval.jsonl
  # You can also switch to source-based config:
  # train_source:
  #   type: kafka
  #   config:
  #     topic: rag-train
  #     bootstrap_servers: 127.0.0.1:9092
  #     max_messages: 200
  # eval_source:
  #   type: jsonl_file
  #   config:
  #     path: data/synthetic_rag_eval.jsonl
  max_seq_length: 512
  seed: 42
  eval_ratio: 0.1
  num_sensitive: 5

training:
  # Smoke run: validate pipeline wiring, not model quality.
  num_train_epochs: 1
  max_steps: 8
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  warmup_ratio: 0.0
  lr_scheduler_type: cosine
  logging_strategy: steps
  logging_steps: 1
  save_steps: 4
  eval_steps: 4
  evaluation_strategy: steps
  save_strategy: steps
  save_total_limit: 2
  resume_from_checkpoint: false
  report_to: []
  deepspeed_config: configs/deepspeed_zero2.json
  gradient_checkpointing: true
  load_best_model_at_end: false

export:
  adapter_dir: adapter
  merge_adapter: false
  merged_model_dir: merged_model
  safe_serialization: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
